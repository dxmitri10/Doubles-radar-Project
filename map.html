<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DoubleFinder – Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --saffron: #F4A300;
      --turmeric: #E8820C;
      --pepper-red: #C0392B;
      --leaf: #2D6A4F;
      --cream: #FFF8EC;
      --dark: #0E1A14;
      --dark2: #162310;
      --border: rgba(244,163,0,0.15);
      --text-muted: #7A8C82;
      --success: #27AE60;
      --nav-h: 60px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* NAVIGATION OF PAGE */
    nav {
      height: var(--nav-h); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(14,26,20,0.95);
      border-bottom: 1px solid var(--border);
      z-index: 200;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--saffron); text-decoration: none; }
    .logo span { color: var(--cream); }
    .nav-links { display: flex; gap: 1.2rem; align-items: center; list-style: none; }
    .nav-links a { color: var(--cream); text-decoration: none; font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; transition: opacity 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--saffron); }
    .btn-sm { background: var(--saffron); color: var(--dark) !important; padding: 0.4rem 1.1rem; border-radius: 2px; opacity: 1 !important; font-size: 0.78rem !important; }
    .btn-sm:hover { background: var(--turmeric) !important; }

    /* LAYOUT OF PAGE */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBAR FOR DISPLAYING DATA */
    .sidebar {
      width: 360px; flex-shrink: 0;
      background: var(--dark2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top { padding: 1rem; border-bottom: 1px solid var(--border); }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.4rem;
      background: rgba(255,248,236,0.05); border: 1px solid var(--border);
      border-radius: 3px; color: var(--cream); font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; outline: none; transition: border-color 0.2s;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box input:focus { border-color: var(--saffron); }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); font-size: 0.85rem; color: var(--text-muted); pointer-events: none; }
    .filter-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .chip {
      padding: 0.3rem 0.85rem; border-radius: 99px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; cursor: pointer; transition: all 0.18s;
    }
    .chip:hover { border-color: var(--saffron); color: var(--saffron); }
    .chip.active { background: var(--saffron); border-color: var(--saffron); color: var(--dark); font-weight: 600; }

    /* lIST OF VENDORS */
    .vendor-list { flex: 1; overflow-y: auto; padding: 0.75rem; }
    .vendor-list::-webkit-scrollbar { width: 4px; }
    .vendor-list::-webkit-scrollbar-track { background: transparent; }
    .vendor-list::-webkit-scrollbar-thumb { background: rgba(244,163,0,0.2); border-radius: 99px; }
    .vendor-card {
      background: rgba(255,248,236,0.03);
      border: 1px solid transparent;
      border-radius: 4px; padding: 1rem;
      margin-bottom: 0.5rem; cursor: pointer;
      transition: all 0.2s;
    }
    .vendor-card:hover, .vendor-card.selected {
      background: rgba(244,163,0,0.07);
      border-color: rgba(244,163,0,0.3);
    }
    .vc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.4rem; }
    .vc-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; line-height: 1.2; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .status-dot.open { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.closed { background: var(--pepper-red); }
    .vc-loc { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .vc-meta { display: flex; align-items: center; gap: 0.75rem; }
    .vc-rating { font-size: 0.8rem; color: var(--saffron); font-weight: 600; }
    .vc-dist { font-size: 0.75rem; color: var(--text-muted); }
    .vc-updated { font-size: 0.72rem; color: var(--text-muted); }
    .vc-tags { display: flex; gap: 0.35rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .tag { font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 2px; background: rgba(244,163,0,0.1); color: var(--saffron); border: 1px solid rgba(244,163,0,0.2); }
    .no-results { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.875rem; }

    /* MAP STYLE */
    #map { flex: 1; height: 100%; }

    /* panel to display info */
    .info-panel {
      position: absolute; top: var(--nav-h); right: 0; bottom: 0;
      width: 360px; background: var(--dark2);
      border-left: 1px solid var(--border);
      overflow-y: auto; z-index: 150;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
    }
    .info-panel.open { transform: translateX(0); }
    .info-panel::-webkit-scrollbar { width: 4px; }
    .info-panel::-webkit-scrollbar-thumb { background: rgba(244,163,0,0.2); border-radius: 99px; }
    .panel-close {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--cream); width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .panel-close:hover { background: rgba(255,255,255,0.12); }
    .panel-header { padding: 1.25rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); }
    .panel-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 2px; margin-bottom: 0.6rem;
    }
    .panel-badge.open { background: rgba(39,174,96,0.15); color: var(--success); border: 1px solid rgba(39,174,96,0.3); }
    .panel-badge.closed { background: rgba(192,57,43,0.15); color: var(--pepper-red); border: 1px solid rgba(192,57,43,0.3); }
    .panel-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 1px; line-height: 1; margin-bottom: 0.3rem; }
    .panel-loc { font-size: 0.82rem; color: var(--text-muted); }
    .panel-rating { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.6rem; }
    .stars { color: var(--saffron); font-size: 0.9rem; }
    .rating-num { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--saffron); }
    .rating-count { font-size: 0.78rem; color: var(--text-muted); }
    .panel-body { padding: 1rem 1.25rem; flex: 1; }
    .panel-section { margin-bottom: 1.25rem; }
    .panel-section h4 { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
    .status-text { font-size: 0.875rem; font-weight: 500; }
    .status-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    .btn-group { display: flex; gap: 0.5rem; }
    .btn-confirm {
      padding: 0.45rem 0.9rem; border-radius: 3px; font-family: 'Syne', sans-serif;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      cursor: pointer; border: 1px solid; transition: all 0.18s;
    }
    .btn-confirm.open-btn { border-color: var(--success); color: var(--success); background: rgba(39,174,96,0.08); }
    .btn-confirm.open-btn:hover { background: rgba(39,174,96,0.2); }
    .btn-confirm.closed-btn { border-color: var(--pepper-red); color: var(--pepper-red); background: rgba(192,57,43,0.08); }
    .btn-confirm.closed-btn:hover { background: rgba(192,57,43,0.2); }
    .hours-grid { display: flex; flex-direction: column; gap: 0.4rem; }
    .hours-row { display: flex; justify-content: space-between; font-size: 0.825rem; }
    .hours-day { color: var(--text-muted); }
    .hours-time { font-weight: 500; }
    .menu-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .menu-tag { font-size: 0.78rem; padding: 0.3rem 0.75rem; border-radius: 2px; background: rgba(244,163,0,0.08); color: var(--cream); border: 1px solid rgba(244,163,0,0.2); }
    .comment-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .comment { padding: 0.75rem; background: rgba(255,248,236,0.03); border-radius: 3px; border-left: 2px solid var(--saffron); }
    .comment-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
    .comment-user { font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; }
    .comment-stars { color: var(--saffron); font-size: 0.72rem; }
    .comment-time { font-size: 0.68rem; color: var(--text-muted); margin-left: auto; }
    .comment-text { font-size: 0.82rem; color: rgba(255,248,236,0.7); line-height: 1.5; }
    .add-comment { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .add-comment input {
      flex: 1; padding: 0.55rem 0.85rem;
      background: rgba(255,248,236,0.05); border: 1px solid var(--border);
      border-radius: 3px; color: var(--cream); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; outline: none; transition: border-color 0.2s;
    }
    .add-comment input:focus { border-color: var(--saffron); }
    .add-comment input::placeholder { color: var(--text-muted); }
    .add-comment button {
      padding: 0.55rem 0.9rem; background: var(--saffron); color: var(--dark);
      border: none; border-radius: 3px; font-family: 'Syne', sans-serif;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .add-comment button:hover { background: var(--turmeric); }
    .rate-section { margin-bottom: 1.25rem; }
    .star-picker { display: flex; gap: 0.4rem; }
    .star-picker span { font-size: 1.5rem; cursor: pointer; transition: transform 0.1s; color: var(--text-muted); }
    .star-picker span:hover, .star-picker span.lit { color: var(--saffron); transform: scale(1.2); }
    .panel-actions { display: flex; gap: 0.6rem; padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
    .btn-action {
      flex: 1; padding: 0.65rem; border-radius: 3px; font-family: 'Syne', sans-serif;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      cursor: pointer; border: 1px solid; transition: all 0.18s; text-align: center;
    }
    .btn-save { border-color: var(--saffron); color: var(--saffron); background: rgba(244,163,0,0.06); }
    .btn-save:hover, .btn-save.saved { background: var(--saffron); color: var(--dark); }
    .btn-directions { border-color: rgba(255,248,236,0.2); color: var(--cream); background: rgba(255,248,236,0.04); }
    .btn-directions:hover { border-color: var(--saffron); color: var(--saffron); }

     /* TOAST */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e3a2a; border: 1px solid rgba(244,163,0,0.3);
      color: var(--cream); padding: 0.7rem 1.5rem; border-radius: 3px;
      font-size: 0.85rem; font-weight: 500; z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* BUTTON FOR LOCATION OF USER */
    .locate-btn {
      position: absolute; bottom: 120px; right: 380px;
      background: var(--dark2); border: 1px solid var(--border);
      color: var(--cream); padding: 0.6rem 1rem;
      border-radius: 3px; cursor: pointer; z-index: 100;
      font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem;
    }
    .locate-btn:hover { border-color: var(--saffron); color: var(--saffron); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .info-panel { width: 100%; }
      .locate-btn { right: 1rem; }
    }
  </style>
</head>
<body>

    <! navigation >
<nav>
  <a href="index.html" class="logo">Double<span>Finder</span></a>
  <ul class="nav-links">
    <li><a href="map.html" class="active">Find Doubles</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
    <li><a href="login.html">Log In</a></li>
    <li><a href="register.html" class="btn-sm">Sign Up</a></li>
  </ul>
</nav>

   <!APPLICATION BODY >
<div class="app-body" style="position:relative;">

   <! SIDEBAR FOR FILTERING LIST >
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search vendors or areas…" oninput="filterList()">
      </div>
      <div class="filter-row">
        <button class="chip active" data-filter="all"    onclick="setFilter('all',this)">All</button>
        <button class="chip"        data-filter="open"   onclick="setFilter('open',this)">Open Now</button>
        <button class="chip"        data-filter="rated"  onclick="setFilter('rated',this)">Top Rated</button>
        <button class="chip"        data-filter="nearby" onclick="setFilter('nearby',this)">Nearest</button>
      </div>
    </div>
    <div class="vendor-list" id="vendor-list"></div>
  </div>


  <div id="map"></div>

  <! MY LOCATION >
  <button class="locate-btn" onclick="locateMe()">📍 My Location</button>

  <! PANEL FOR INFO ON VENDORS > 
  <div class="info-panel" id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-content"></div>
    <div class="panel-actions" id="panel-actions" style="display:none;">
      <button class="btn-action btn-save"       id="btn-save"       onclick="toggleSave()">♡ Save</button>
      <button class="btn-action btn-directions" id="btn-directions" onclick="openDirections()">↗ Directions</button>
    </div>
  </div>

</div>


<div id="toast"></div>

<! DATA LIST >

<script>
const VENDORS = [
  {
    id:'v1', name:"Ali's Doubles", location:"EMR Road, Chaguanas", landmark:"Near TSTT office",
    lat:10.5168, lng:-61.4007, isOpen:true, est:2011, distance:0.3,
    lastUpdate:'4 min ago', updatedBy:'trini_foodie',
    rating:4.9, numRatings:142,
    sells:['Doubles','Bara only','Channa'],
    hours:{ monFri:'5:30am – 8:00am', sat:'6:00am – 9:00am', sun:'Closed' },
    notes:'Sells out fast on weekdays!',
    comments:[
      { user:'trini_foodie', rating:5, text:'Best bara in Chaguanas. Pepper sauce is fire!', time:'2 days ago' },
      { user:'Kamla_TT',     rating:4, text:'Slight peppah and extra channa hits different.', time:'5 days ago' },
    ]
  },
  {
    id:'v2', name:"D-Man's Corner", location:"Wrightson Road, POS", landmark:"Near Port Authority",
    lat:10.6497, lng:-61.5099, isOpen:true, est:2015, distance:0.7,
    lastUpdate:'11 min ago', updatedBy:'SarahK',
    rating:4.6, numRatings:89,
    sells:['Doubles','Pholourie','Channa'],
    hours:{ monFri:'6:00am – 9:00am', sat:'6:30am – 10:00am', sun:'7:00am – 11:00am' },
    notes:'Slight pepper is the move.',
    comments:[
      { user:'SarahK', rating:5, text:'D-Man never misses. Consistent every morning.', time:'1 day ago' },
    ]
  },
  {
    id:'v3', name:'Sauce Boss', location:'Tunapuna Main Road', landmark:'Opposite library',
    lat:10.6384, lng:-61.3819, isOpen:false, est:2009, distance:1.1,
    lastUpdate:'2 hrs ago', updatedBy:'JennyD',
    rating:5.0, numRatings:203,
    sells:['Doubles','Pholourie','Bara only'],
    hours:{ monFri:'5:00am – 7:30am', sat:'5:30am – 8:30am', sun:'Closed' },
    notes:'THE best doubles in East Trinidad.',
    comments:[
      { user:'JennyD',      rating:5, text:'Perfect score for a reason. Unmatched!', time:'3 days ago' },
      { user:'DoublesDave', rating:5, text:'5 stars is too low. Legendary spot.', time:'1 week ago' },
    ]
  },
  {
    id:'v4', name:'Trini Doubles Hub', location:'San Fernando Main Road', landmark:'Near Skinner Park',
    lat:10.2800, lng:-61.4668, isOpen:true, est:2018, distance:1.8,
    lastUpdate:'22 min ago', updatedBy:'PaulC',
    rating:4.4, numRatings:67,
    sells:['Doubles','Channa'],
    hours:{ monFri:'6:30am – 9:30am', sat:'7:00am – 11:00am', sun:'7:00am – 10:00am' },
    notes:'Great for San Fernando.',
    comments:[
      { user:'PaulC', rating:4, text:'Solid spot in Sando. Good value.', time:'2 days ago' },
    ]
  },
  {
    id:'v5', name:"Mavis Doubles", location:"St. James Main Road", landmark:"Near Smokey & Bunty",
    lat:10.6500, lng:-61.4400, isOpen:true, est:2005, distance:0.5,
    lastUpdate:'8 min ago', updatedBy:'DoublesDave',
    rating:4.7, numRatings:118,
    sells:['Doubles','Bara only'],
    hours:{ monFri:'5:30am – 9:00am', sat:'5:30am – 10:00am', sun:'6:00am – 10:00am' },
    notes:'Open Sunday! Rare find.',
    comments:[
      { user:'DoublesDave', rating:5, text:'Open on Sunday is a blessing. Quality never drops.', time:'3 days ago' },
    ]
  },
];


let currentFilter = 'all';
let selectedId    = null;
let savedIds      = JSON.parse(localStorage.getItem('df_saved') || '[]');
let userRatings   = JSON.parse(localStorage.getItem('df_ratings') || '{}');
let map, markers  = {}, infoWindows = {}, userLocation = null;


function starsHTML(n) {
  n = Math.round(parseFloat(n) * 2) / 2;
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= n ? '★' : (i - 0.5 === n ? '½' : '☆');
  return s;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

/* lIST FILTERING */
function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let list = VENDORS.filter(v =>
    !q || v.name.toLowerCase().includes(q) || v.location.toLowerCase().includes(q)
  );
  if (currentFilter === 'open')   list = list.filter(v => v.isOpen);
  if (currentFilter === 'rated')  list = [...list].sort((a,b) => b.rating - a.rating);
  if (currentFilter === 'nearby') list = [...list].sort((a,b) => a.distance - b.distance);
  return list;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderList();
}

function filterList() { renderList(); }

function renderList() {
  const el = document.getElementById('vendor-list');
  const list = getFiltered();
  if (!list.length) {
    el.innerHTML = '<div class="no-results">No vendors found</div>'; return;
  }
  el.innerHTML = list.map(v => `
    <div class="vendor-card${selectedId === v.id ? ' selected' : ''}" onclick="selectVendor('${v.id}')">
      <div class="vc-top">
        <div class="vc-name">${v.name}</div>
        <div class="status-dot ${v.isOpen ? 'open' : 'closed'}"></div>
      </div>
      <div class="vc-loc">📍 ${v.location}</div>
      <div class="vc-meta">
        <span class="vc-rating">★ ${v.rating}</span>
        <span class="vc-dist">${v.distance} km</span>
        <span class="vc-updated">· ${v.lastUpdate}</span>
      </div>
      <div class="vc-tags">${v.sells.map(s => `<span class="tag">${s}</span>`).join('')}</div>
    </div>
  `).join('');
}

/* FINDING VENDOR */
function selectVendor(id) {
  selectedId = id;
  renderList();
  const v = VENDORS.find(x => x.id === id);
  if (!v) return;

  /* GOES TO VENDOR */
  if (map) {
    map.panTo({ lat: v.lat, lng: v.lng });
    map.setZoom(15);
      
    Object.values(infoWindows).forEach(iw => iw.close());
    if (infoWindows[id]) infoWindows[id].open(map, markers[id]);
  }

  openPanel(v);
}

/* INFO PANEL */
function openPanel(v) {
  const isSaved  = savedIds.includes(v.id);
  const userStar = userRatings[v.id] || 0;

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-header">
      <div class="panel-badge ${v.isOpen ? 'open' : 'closed'}">
        <span>${v.isOpen ? '●' : '●'}</span> ${v.isOpen ? 'Open Now' : 'Closed'}
      </div>
      <div class="panel-name">${v.name}</div>
      <div class="panel-loc">📍 ${v.location} · Est. ${v.est}</div>
      <div class="panel-rating">
        <span class="stars">${starsHTML(v.rating)}</span>
        <span class="rating-num">${v.rating}</span>
        <span class="rating-count">(${v.numRatings} ratings)</span>
      </div>
    </div>

    <div class="panel-body">

      <div class="panel-section">
        <h4>Community Status</h4>
        <div class="status-row">
          <div>
            <div class="status-text">${v.isOpen ? '✅ Open right now' : '🔴 Currently closed'}</div>
            <div class="status-time">Last confirmed ${v.lastUpdate} by ${v.updatedBy}</div>
          </div>
          <div class="btn-group">
            <button class="btn-confirm open-btn"   onclick="confirmStatus('${v.id}', true)">✓ Open</button>
            <button class="btn-confirm closed-btn" onclick="confirmStatus('${v.id}', false)">✗ Closed</button>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h4>Rate this vendor</h4>
        <div class="star-picker" id="star-picker">
          ${[1,2,3,4,5].map(n => `
            <span data-n="${n}" class="${userStar >= n ? 'lit' : ''}"
              onclick="rateVendor('${v.id}', ${n})"
              onmouseover="hoverStars(${n})"
              onmouseout="resetStars(${userStar})">★</span>`
          ).join('')}
        </div>
      </div>

      <div class="panel-section">
        <h4>Hours</h4>
        <div class="hours-grid">
          <div class="hours-row"><span class="hours-day">Mon – Fri</span><span class="hours-time">${v.hours.monFri}</span></div>
          <div class="hours-row"><span class="hours-day">Saturday</span><span class="hours-time">${v.hours.sat}</span></div>
          <div class="hours-row"><span class="hours-day">Sunday</span><span class="hours-time">${v.hours.sun}</span></div>
        </div>
      </div>

      <div class="panel-section">
        <h4>Menu Items</h4>
        <div class="menu-tags">${v.sells.map(s => `<span class="menu-tag">${s}</span>`).join('')}</div>
        ${v.notes ? `<p style="font-size:.78rem;color:var(--text-muted);margin-top:.6rem;font-style:italic;">💡 ${v.notes}</p>` : ''}
      </div>

      <div class="panel-section">
        <h4>Comments</h4>
        <div class="comment-list" id="comment-list">
          ${v.comments.map(c => `
            <div class="comment">
              <div class="comment-meta">
                <span class="comment-user">${c.user}</span>
                <span class="comment-stars">${starsHTML(c.rating)}</span>
                <span class="comment-time">${c.time}</span>
              </div>
              <div class="comment-text">${c.text}</div>
            </div>`).join('')}
        </div>
        <div class="add-comment">
          <input id="comment-input" type="text" placeholder="Add a comment… (Enter to post)"
            onkeydown="if(event.key==='Enter') postComment('${v.id}')">
          <button onclick="postComment('${v.id}')">Post</button>
        </div>
      </div>

    </div>
  `;

  /* ACTION BAR UPDATING */
  const actBar = document.getElementById('panel-actions');
  const btnSave = document.getElementById('btn-save');
  actBar.style.display = 'flex';
  btnSave.textContent = isSaved ? '♥ Saved' : '♡ Save';
  btnSave.classList.toggle('saved', isSaved);

  document.getElementById('info-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  selectedId = null;
  renderList();
  Object.values(infoWindows).forEach(iw => iw.close());
}

/* CONFIRMING STATUS */
function confirmStatus(id, isOpen) {
  const v = VENDORS.find(x => x.id === id);
  v.isOpen = isOpen; v.lastUpdate = 'just now'; v.updatedBy = 'You';
  // update marker icon
  if (markers[id]) markers[id].setIcon(markerIcon(isOpen));
  openPanel(v); renderList();
  toast(isOpen ? '✅ Marked as Open — thanks!' : '🔴 Marked as Closed — thanks!');
}

/* RATING SYSTEM */
function hoverStars(n) {
  document.querySelectorAll('#star-picker span').forEach((s,i) => {
    s.classList.toggle('lit', i < n);
  });
}
function resetStars(current) {
  document.querySelectorAll('#star-picker span').forEach((s,i) => {
    s.classList.toggle('lit', i < current);
  });
}
function rateVendor(id, n) {
  const v = VENDORS.find(x => x.id === id);
  v.rating = Math.min(5, Math.round((v.rating * v.numRatings + n) / (v.numRatings + 1) * 10) / 10);
  v.numRatings++;
  userRatings[id] = n;
  localStorage.setItem('df_ratings', JSON.stringify(userRatings));
  openPanel(v); renderList();
  toast(`Rated ${n}★ — thanks! You earned +15 pts`);
}

/* COMMENT SYSTEM */
function postComment(id) {
  const input = document.getElementById('comment-input');
  const text  = input.value.trim();
  if (!text) return;
  const v = VENDORS.find(x => x.id === id);
  v.comments.unshift({ user:'You', rating: userRatings[id] || 5, text, time:'just now' });
  input.value = '';
  document.getElementById('comment-list').innerHTML = v.comments.map(c => `
    <div class="comment">
      <div class="comment-meta">
        <span class="comment-user">${c.user}</span>
        <span class="comment-stars">${starsHTML(c.rating)}</span>
        <span class="comment-time">${c.time}</span>
      </div>
      <div class="comment-text">${c.text}</div>
    </div>`).join('');
  toast('Comment posted! +5 pts');
}

/* SAVING DATA */
function toggleSave() {
  if (!selectedId) return;
  const idx = savedIds.indexOf(selectedId);
  if (idx === -1) { savedIds.push(selectedId); toast('Vendor saved! ♥'); }
  else            { savedIds.splice(idx,1);     toast('Removed from saved'); }
  localStorage.setItem('df_saved', JSON.stringify(savedIds));
  const btn = document.getElementById('btn-save');
  const isSaved = savedIds.includes(selectedId);
  btn.textContent = isSaved ? '♥ Saved' : '♡ Save';
  btn.classList.toggle('saved', isSaved);
}

/* DIRECTIONS TO PLACE */
function openDirections() {
  if (!selectedId) return;
  const v = VENDORS.find(x => x.id === selectedId);
  const q = encodeURIComponent(v.name + ', ' + v.location + ', Trinidad');
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${q}`, '_blank');
}

/* LOCATING USER */
function locateMe() {
  if (!navigator.geolocation) { toast('Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (map) {
      map.panTo(userLocation); map.setZoom(14);
      new google.maps.Marker({
        position: userLocation, map,
        title: 'You are here',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8, fillColor: '#4285F4', fillOpacity: 1,
          strokeColor: '#fff', strokeWeight: 2
        }
      });
    }
    toast('📍 Located you!');
   
    VENDORS.forEach(v => {
      const R = 6371;
      const dLat = (v.lat - userLocation.lat) * Math.PI/180;
      const dLon = (v.lng - userLocation.lng) * Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(userLocation.lat*Math.PI/180) * Math.cos(v.lat*Math.PI/180) * Math.sin(dLon/2)**2;
      v.distance = +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
    });
    renderList();
  }, () => toast('Could not get location'));
}

/* ICON MARKER */
function markerIcon(isOpen) {
  const color = isOpen ? '#27AE60' : '#C0392B';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 40 48">
    <path d="M20 0C9 0 0 9 0 20c0 15 20 28 20 28s20-13 20-28C40 9 31 0 20 0z" fill="${color}"/>
    <circle cx="20" cy="20" r="9" fill="white" opacity="0.9"/>
    <text x="20" y="25" text-anchor="middle" font-size="12">🍛</text>
  </svg>`;
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), scaledSize: new google.maps.Size(30, 36), anchor: new google.maps.Point(15, 36) };
}

/* MAP INITIALIZATION */
function initMap() {
  const center = { lat: 10.5209, lng: -61.3900 }; 

  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 10,
    center,
    mapTypeId: 'roadmap',
    styles: [
      { elementType:'geometry',       stylers:[{ color:'#1a2f20' }] },
      { elementType:'labels.text.fill',stylers:[{ color:'#8a9e8f' }] },
      { elementType:'labels.text.stroke',stylers:[{ color:'#1a2f20' }] },
      { featureType:'road',             elementType:'geometry',       stylers:[{ color:'#253a28' }] },
      { featureType:'road',             elementType:'geometry.stroke', stylers:[{ color:'#1a2f20' }] },
      { featureType:'road',             elementType:'labels.text.fill',stylers:[{ color:'#9ca5aa' }] },
      { featureType:'road.highway',     elementType:'geometry',       stylers:[{ color:'#2d5a3d' }] },
      { featureType:'road.highway',     elementType:'geometry.stroke', stylers:[{ color:'#1f4a2e' }] },
      { featureType:'road.highway',     elementType:'labels.text.fill',stylers:[{ color:'#f3d19c' }] },
      { featureType:'water',            elementType:'geometry',       stylers:[{ color:'#0e2020' }] },
      { featureType:'water',            elementType:'labels.text.fill',stylers:[{ color:'#515c6d' }] },
      { featureType:'poi',              elementType:'geometry',       stylers:[{ color:'#1c3a22' }] },
      { featureType:'poi.park',         elementType:'geometry',       stylers:[{ color:'#1e3c25' }] },
      { featureType:'transit',          elementType:'geometry',       stylers:[{ color:'#1d3a22' }] },
    ],
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
    fullscreenControl: true,
    fullscreenControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
  });

  /* VENDOR MARKERS*/
  VENDORS.forEach(v => {
    const marker = new google.maps.Marker({
      position: { lat: v.lat, lng: v.lng },
      map,
      title: v.name,
      icon: markerIcon(v.isOpen),
      animation: google.maps.Animation.DROP,
    });

    const iw = new google.maps.InfoWindow({
      content: `<div style="font-family:'DM Sans',sans-serif;padding:2px 4px;color:#0E1A14;">
        <strong style="font-size:.9rem;">${v.name}</strong><br>
        <span style="font-size:.78rem;color:#555;">${v.location}</span><br>
        <span style="color:${v.isOpen ? '#27AE60' : '#C0392B'};font-size:.8rem;font-weight:600;">
          ${v.isOpen ? '● Open' : '● Closed'}
        </span>
        &nbsp;<span style="font-size:.78rem;color:#888;">★ ${v.rating}</span>
      </div>`
    });

    marker.addListener('click', () => {
      Object.values(infoWindows).forEach(x => x.close());
      iw.open(map, marker);
      selectVendor(v.id);
    });

    markers[v.id]     = marker;
    infoWindows[v.id] = iw;
  });

  renderList();
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyATnemg7sJtXZs8O65pa2LJuH7F5UQSjNw&callback=initMap&loading=async"
  async defer>
</script>
