<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DoubleFinder – Find Doubles</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#F4A300" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DoubleFinder" />
  <link rel="apple-touch-icon" href="https://placehold.co/192x192/F4A300/0E1A14?text=DF" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCAtb6i_Nu7bTFjBYaLbjMQxJWiosbrG9w&libraries=places" defer></script>
  <style>
    :root {
      --saffron: #F4A300;
      --turmeric: #E8820C;
      --pepper-red: #C0392B;
      --leaf: #2D6A4F;
      --cream: #FFF8EC;
      --dark: #0E1A14;
      --dark2: #162310;
      --border: rgba(244,163,0,0.15);
      --text-muted: #7A8C82;
      --success: #27AE60;
      --nav-h: 60px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--dark); color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

 
    nav {
      height: var(--nav-h); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(14,26,20,0.97);
      border-bottom: 1px solid var(--border);
      z-index: 500;
    }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:2px; color:var(--saffron); text-decoration:none; }
    .logo span { color:var(--cream); }
    .nav-links { display:flex; gap:1.2rem; align-items:center; list-style:none; }
    .nav-links a { color:var(--cream); text-decoration:none; font-family:'Syne',sans-serif; font-size:0.8rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; opacity:0.7; transition:opacity 0.2s, color 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity:1; color:var(--saffron); }
    .btn-sm { background:var(--saffron); color:var(--dark) !important; padding:0.4rem 1.1rem; border-radius:2px; opacity:1 !important; font-size:0.78rem !important; }
    .btn-sm:hover { background:var(--turmeric) !important; }

    .app-body { display:flex; flex:1; overflow:hidden; position:relative; }


    .sidebar {
      width: 360px; flex-shrink:0;
      background: var(--dark2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; z-index: 200;
    }
    .sidebar-top { padding:1rem; border-bottom:1px solid var(--border); }
    .search-box { position:relative; }
    .search-box input {
      width:100%; padding:0.65rem 1rem 0.65rem 2.4rem;
      background:rgba(255,248,236,0.05); border:1px solid var(--border);
      border-radius:3px; color:var(--cream); font-family:'DM Sans',sans-serif;
      font-size:0.875rem; outline:none; transition:border-color 0.2s;
    }
    .search-box input::placeholder { color:var(--text-muted); }
    .search-box input:focus { border-color:var(--saffron); }
    .search-icon { position:absolute; left:0.75rem; top:50%; transform:translateY(-50%); font-size:0.85rem; color:var(--text-muted); pointer-events:none; }
    .filter-row { display:flex; gap:0.4rem; margin-top:0.75rem; flex-wrap:wrap; }
    .chip {
      padding:0.28rem 0.8rem; border-radius:99px;
      border:1px solid var(--border); background:transparent;
      color:var(--text-muted); font-family:'DM Sans',sans-serif;
      font-size:0.72rem; cursor:pointer; transition:all 0.18s; white-space:nowrap;
    }
    .chip:hover { border-color:var(--saffron); color:var(--saffron); }
    .chip.active { background:var(--saffron); border-color:var(--saffron); color:var(--dark); font-weight:600; }

    .sidebar-count {
      padding:0.5rem 1rem 0.4rem;
      font-family:'Syne',sans-serif; font-size:0.68rem; font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase;
      color:var(--text-muted); border-bottom:1px solid var(--border);
    }


    .vendor-list { flex:1; overflow-y:auto; padding:0.6rem; }
    .vendor-list::-webkit-scrollbar { width:3px; }
    .vendor-list::-webkit-scrollbar-thumb { background:rgba(244,163,0,0.2); border-radius:99px; }

    .vendor-card {
      background:rgba(255,248,236,0.02);
      border:1px solid transparent; border-radius:4px;
      padding:0.85rem 1rem; margin-bottom:0.4rem;
      cursor:pointer; transition:all 0.18s;
    }
    .vendor-card:hover { background:rgba(244,163,0,0.06); border-color:rgba(244,163,0,0.2); }
    .vendor-card.selected { background:rgba(244,163,0,0.09); border-color:rgba(244,163,0,0.4); }
    .vc-top { display:flex; align-items:flex-start; justify-content:space-between; gap:0.5rem; margin-bottom:0.3rem; }
    .vc-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; line-height:1.3; }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .status-dot.open  { background:var(--success); box-shadow:0 0 5px var(--success); }
    .status-dot.closed { background:var(--pepper-red); }
    .status-dot.unknown { background:var(--text-muted); }
    .vc-loc { font-size:0.75rem; color:var(--text-muted); margin-bottom:0.4rem; }
    .vc-meta { display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
    .vc-rating { font-size:0.78rem; color:var(--saffron); font-weight:600; }
    .vc-dist { font-size:0.72rem; color:var(--text-muted); }
    .vc-source { font-size:0.68rem; color:var(--text-muted); padding:0.12rem 0.4rem; border:1px solid rgba(244,163,0,0.1); border-radius:2px; }
    .vc-tags { display:flex; gap:0.3rem; margin-top:0.45rem; flex-wrap:wrap; }
    .tag { font-size:0.66rem; padding:0.12rem 0.45rem; border-radius:2px; background:rgba(244,163,0,0.08); color:var(--saffron); border:1px solid rgba(244,163,0,0.18); }

    .loading-state, .no-results {
      text-align:center; padding:2.5rem 1rem; color:var(--text-muted); font-size:0.85rem;
    }
    .loading-state .spinner {
      width:28px; height:28px; border:2px solid rgba(244,163,0,0.2);
      border-top-color:var(--saffron); border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 0.75rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }


    #map { flex:1; height:100%; z-index:1; }

   
    .gm-style .gm-style-iw-c {
      background: var(--dark2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5) !important;
      padding: 0 !important;
    }
    .gm-style .gm-style-iw-d {
      overflow: hidden !important;
      color: var(--cream) !important;
    }
    .gm-style .gm-style-iw-t::after {
      background: var(--dark2) !important;
    }
    .gm-style-iw button.gm-ui-hover-effect {
      top: 2px !important; right: 2px !important;
    }
    .gm-style-iw button.gm-ui-hover-effect img {
      filter: invert(1) !important;
    }


    .map-popup { font-family:'DM Sans',sans-serif; padding:2px 0; min-width:180px; }
    .map-popup-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; margin-bottom:0.25rem; }
    .map-popup-loc { font-size:0.74rem; color:var(--text-muted); margin-bottom:0.4rem; }
    .map-popup-meta { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; }
    .map-popup-status { font-size:0.72rem; font-weight:700; }
    .map-popup-status.open { color:var(--success); }
    .map-popup-status.closed { color:var(--pepper-red); }
    .map-popup-status.unknown { color:var(--text-muted); }
    .map-popup-rating { font-size:0.72rem; color:var(--saffron); }
    .map-popup-btn {
      display:block; width:100%; text-align:center;
      background:var(--saffron); color:var(--dark);
      border:none; border-radius:2px; padding:0.4rem;
      font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700;
      letter-spacing:0.5px; text-transform:uppercase;
      cursor:pointer; transition:background 0.18s;
    }
    .map-popup-btn:hover { background:var(--turmeric); }

  
    .map-controls {
      position:absolute; bottom:1.5rem; right:1rem;
      display:flex; flex-direction:column; gap:0.5rem; z-index:300;
    }
    .map-btn {
      background:var(--dark2); border:1px solid var(--border);
      color:var(--cream); padding:0.55rem 0.9rem;
      border-radius:3px; cursor:pointer; z-index:100;
      font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700;
      letter-spacing:0.5px; text-transform:uppercase;
      transition:all 0.2s; display:flex; align-items:center; gap:0.4rem;
      white-space:nowrap;
    }
    .map-btn:hover { border-color:var(--saffron); color:var(--saffron); }
    .map-btn.active { border-color:var(--saffron); color:var(--saffron); background:rgba(244,163,0,0.08); }


    .info-panel {
      position:absolute; top:0; right:0; bottom:0;
      width:370px; background:var(--dark2);
      border-left:1px solid var(--border);
      overflow-y:auto; z-index:400;
      transform:translateX(100%);
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display:flex; flex-direction:column;
    }
    .info-panel.open { transform:translateX(0); }
    .info-panel::-webkit-scrollbar { width:3px; }
    .info-panel::-webkit-scrollbar-thumb { background:rgba(244,163,0,0.2); border-radius:99px; }

    .panel-close {
      position:absolute; top:0.85rem; right:0.85rem;
      background:rgba(255,255,255,0.06); border:1px solid var(--border);
      color:var(--cream); width:28px; height:28px; border-radius:50%;
      cursor:pointer; font-size:0.8rem; display:flex; align-items:center; justify-content:center;
      transition:background 0.2s; z-index:10;
    }
    .panel-close:hover { background:rgba(255,255,255,0.12); }

    .panel-header { padding:1.25rem 1.25rem 0.8rem; border-bottom:1px solid var(--border); }
    .panel-badge {
      display:inline-flex; align-items:center; gap:0.35rem;
      font-size:0.68rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
      padding:0.18rem 0.55rem; border-radius:2px; margin-bottom:0.5rem;
    }
    .panel-badge.open   { background:rgba(39,174,96,0.15);  color:var(--success);    border:1px solid rgba(39,174,96,0.3); }
    .panel-badge.closed { background:rgba(192,57,43,0.15);  color:var(--pepper-red); border:1px solid rgba(192,57,43,0.3); }
    .panel-badge.unknown{ background:rgba(122,140,130,0.15);color:var(--text-muted); border:1px solid rgba(122,140,130,0.3); }
    .panel-name { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:1px; line-height:1; margin-bottom:0.3rem; padding-right:2rem; }
    .panel-loc  { font-size:0.8rem; color:var(--text-muted); }
    .panel-rating { display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem; }
    .stars       { color:var(--saffron); font-size:0.85rem; }
    .rating-num  { font-family:'Syne',sans-serif; font-weight:700; color:var(--saffron); }
    .rating-count{ font-size:0.75rem; color:var(--text-muted); }

    .panel-body { padding:1rem 1.25rem; flex:1; }
    .panel-section { margin-bottom:1.2rem; }
    .panel-section h4 {
      font-family:'Syne',sans-serif; font-size:0.68rem; font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:0.55rem;
    }

    .info-grid { display:flex; flex-direction:column; gap:0.4rem; }
    .info-row { display:flex; justify-content:space-between; align-items:baseline; font-size:0.82rem; }
    .info-key { color:var(--text-muted); }
    .info-val { font-weight:500; text-align:right; max-width:60%; }

    .status-row { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; flex-wrap:wrap; }
    .status-text { font-size:0.875rem; font-weight:500; }
    .status-time { font-size:0.73rem; color:var(--text-muted); margin-top:0.15rem; }
    .btn-group { display:flex; gap:0.4rem; }
    .btn-confirm {
      padding:0.4rem 0.8rem; border-radius:3px; font-family:'Syne',sans-serif;
      font-size:0.72rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
      cursor:pointer; border:1px solid; transition:all 0.18s;
    }
    .btn-confirm.open-btn   { border-color:var(--success);    color:var(--success);    background:rgba(39,174,96,0.08); }
    .btn-confirm.open-btn:hover   { background:rgba(39,174,96,0.2); }
    .btn-confirm.closed-btn { border-color:var(--pepper-red); color:var(--pepper-red); background:rgba(192,57,43,0.08); }
    .btn-confirm.closed-btn:hover { background:rgba(192,57,43,0.2); }

    .osm-link {
      display:inline-flex; align-items:center; gap:0.3rem;
      font-size:0.72rem; color:var(--saffron); text-decoration:none;
      font-family:'Syne',sans-serif; font-weight:600;
      padding:0.3rem 0.6rem; border:1px solid rgba(244,163,0,0.25);
      border-radius:2px; transition:background 0.18s;
    }
    .osm-link:hover { background:rgba(244,163,0,0.08); }

    .hours-grid { display:flex; flex-direction:column; gap:0.35rem; }
    .hours-row  { display:flex; justify-content:space-between; font-size:0.8rem; }
    .hours-day  { color:var(--text-muted); }
    .hours-time { font-weight:500; }

    .menu-tags  { display:flex; flex-wrap:wrap; gap:0.35rem; }
    .menu-tag   { font-size:0.76rem; padding:0.28rem 0.7rem; border-radius:2px; background:rgba(244,163,0,0.07); color:var(--cream); border:1px solid rgba(244,163,0,0.18); }

    .comment-list { display:flex; flex-direction:column; gap:0.65rem; }
    .comment { padding:0.7rem; background:rgba(255,248,236,0.03); border-radius:3px; border-left:2px solid var(--saffron); }
    .comment-meta { display:flex; align-items:center; gap:0.4rem; margin-bottom:0.25rem; }
    .comment-user  { font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; }
    .comment-stars { color:var(--saffron); font-size:0.7rem; }
    .comment-time  { font-size:0.65rem; color:var(--text-muted); margin-left:auto; }
    .comment-text  { font-size:0.8rem; color:rgba(255,248,236,0.7); line-height:1.5; }

    .add-comment { display:flex; gap:0.4rem; margin-top:0.65rem; }
    .add-comment input {
      flex:1; padding:0.5rem 0.8rem;
      background:rgba(255,248,236,0.05); border:1px solid var(--border);
      border-radius:3px; color:var(--cream); font-family:'DM Sans',sans-serif;
      font-size:0.8rem; outline:none; transition:border-color 0.2s;
    }
    .add-comment input:focus { border-color:var(--saffron); }
    .add-comment input::placeholder { color:var(--text-muted); }
    .add-comment button {
      padding:0.5rem 0.85rem; background:var(--saffron); color:var(--dark);
      border:none; border-radius:3px; font-family:'Syne',sans-serif;
      font-size:0.72rem; font-weight:700; cursor:pointer; transition:background 0.2s;
    }
    .add-comment button:hover { background:var(--turmeric); }

    .star-picker { display:flex; gap:0.35rem; }
    .star-picker span { font-size:1.4rem; cursor:pointer; transition:transform 0.1s; color:var(--text-muted); }
    .star-picker span:hover, .star-picker span.lit { color:var(--saffron); transform:scale(1.15); }

    .panel-actions {
      display:flex; gap:0.5rem; padding:0.9rem 1.25rem;
      border-top:1px solid var(--border); flex-shrink:0;
    }
    .btn-action {
      flex:1; padding:0.6rem; border-radius:3px; font-family:'Syne',sans-serif;
      font-size:0.75rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
      cursor:pointer; border:1px solid; transition:all 0.18s; text-align:center;
    }
    .btn-save { border-color:var(--saffron); color:var(--saffron); background:rgba(244,163,0,0.05); }
    .btn-save:hover, .btn-save.saved { background:var(--saffron); color:var(--dark); }
    .btn-directions { border-color:rgba(255,248,236,0.2); color:var(--cream); background:rgba(255,248,236,0.04); }
    .btn-directions:hover { border-color:var(--saffron); color:var(--saffron); }

 
    #toast {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px);
      background:#1e3a2a; border:1px solid rgba(244,163,0,0.3);
      color:var(--cream); padding:0.65rem 1.4rem; border-radius:3px;
      font-size:0.83rem; font-weight:500; z-index:9999;
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }

    
    .user-marker-pulse {
      width:16px; height:16px; border-radius:50%;
      background:rgba(66,133,244,0.3);
      border:2px solid #4285F4;
      box-shadow:0 0 0 4px rgba(66,133,244,0.15);
      animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow:0 0 0 0   rgba(66,133,244,0.4); }
      70%  { box-shadow:0 0 0 10px rgba(66,133,244,0); }
      100% { box-shadow:0 0 0 0   rgba(66,133,244,0); }
    }

   
    @media(max-width:768px) {
      .sidebar { display:none; }
      .info-panel { width:100%; }
      .map-controls { bottom:1rem; right:0.75rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Double<span>Finder</span></a>
  <ul class="nav-links">
    <li><a href="map.html" class="active">Find Doubles</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
    <li><a href="login.html">Log In</a></li>
    <li><a href="register.html" class="btn-sm">Sign Up</a></li>
  </ul>
</nav>

<div class="app-body">

 
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search vendors or areas…" oninput="filterList()">
      </div>
      <div class="filter-row">
        <button class="chip active" onclick="setFilter('all',this)">All</button>
        <button class="chip"        onclick="setFilter('open',this)">Open Now</button>
        <button class="chip"        onclick="setFilter('rated',this)">Top Rated</button>
        <button class="chip"        onclick="setFilter('nearby',this)">Nearest</button>
      </div>
    </div>
    <div class="sidebar-count" id="sidebar-count">Loading…</div>
    <div class="vendor-list" id="vendor-list">
      <div class="loading-state">
        <div class="spinner"></div>
        Fetching doubles vendors from OpenStreetMap…
      </div>
    </div>
  </div>


  <div id="map"></div>


  <div class="map-controls">
    <button class="map-btn" onclick="locateMe()" id="locate-btn">📍 My Location</button>
    <button class="map-btn" onclick="refreshData()" id="refresh-btn">↻ Refresh Area</button>
  </div>


  <div class="info-panel" id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-content"></div>
    <div class="panel-actions" id="panel-actions" style="display:none;">
      <button class="btn-action btn-save"       id="btn-save"       onclick="toggleSave()">♡ Save</button>
      <button class="btn-action btn-directions" id="btn-directions" onclick="openDirections()">↗ Directions</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>

let map, userMarker = null, userLocation = null;
let currentFilter = 'all';
let selectedId    = null;
let savedIds      = JSON.parse(localStorage.getItem('df_saved')    || '[]');
let userRatings   = JSON.parse(localStorage.getItem('df_ratings')  || '{}');
let userComments  = JSON.parse(localStorage.getItem('df_comments') || '{}');
let userStatuses  = JSON.parse(localStorage.getItem('df_statuses') || '{}');
let vendors       = [];  
let markerLayers  = {}; 
let infoWindows   = {}; 


function initMap() {
  const TT_CENTER = { lat: 10.5209, lng: -61.4007 };

  map = new google.maps.Map(document.getElementById('map'), {
    center: TT_CENTER,
    zoom: 13,
    mapTypeId: 'roadmap',
    disableDefaultUI: false,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      { elementType: 'geometry',        stylers: [{ color: '#0e1a14' }] },
      { elementType: 'labels.text.fill',stylers: [{ color: '#7a8c82' }] },
      { elementType: 'labels.text.stroke',stylers:[{ color: '#0e1a14' }] },
      { featureType: 'road',            elementType: 'geometry',        stylers: [{ color: '#162310' }] },
      { featureType: 'road',            elementType: 'geometry.stroke', stylers: [{ color: '#0e1a14' }] },

const OVERPASS_MIRRORS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
];

async function fetchFromOverpass(bbox) {
  var s = bbox[0], w = bbox[1], n = bbox[2], e = bbox[3];


  // Only clamp if the user has zoomed way out. 1.0 degree covers all of Trinidad.
  if ((n - s) > 1.0 || (e - w) > 1.0) {
    var midLat = (s + n) / 2, midLng = (w + e) / 2, r = 0.5;
    s = midLat - r; w = midLng - r; n = midLat + r; e = midLng + r;
  }

  // Cast wide — most doubles vendors in OSM TT are tagged fast_food/street_vendor
  // with no cuisine= tag. osmToVendor() below does the real filtering.
  var query = '[out:json][timeout:25];\n'
    + '(\n'
    + '  node["amenity"~"fast_food|restaurant|snack_bar|food_court|street_vendor|cafe|food_kiosk"](' + s + ',' + w + ',' + n + ',' + e + ');\n'
    + '  node["shop"~"deli|convenience|bakery|food"](' + s + ',' + w + ',' + n + ',' + e + ');\n'
    + '  node["cuisine"~"trinidadian|doubles|caribbean",i](' + s + ',' + w + ',' + n + ',' + e + ');\n'
    + '  node["diet:trinidadian"="yes"](' + s + ',' + w + ',' + n + ',' + e + ');\n'
    + ');\nout body;';

  var body = 'data=' + encodeURIComponent(query);

  for (var i = 0; i < OVERPASS_MIRRORS.length; i++) {
    try {
      var controller = new AbortController();
      var timeoutId  = setTimeout(function(c){ return function(){ c.abort(); }; }(controller), 22000);
      var resp = await fetch(OVERPASS_MIRRORS[i], {
        method:  'POST',
        body:    body,
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        signal:  controller.signal,
      });
      clearTimeout(timeoutId);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return await resp.json();
    } catch (err) {
      console.warn('Overpass mirror ' + i + ' failed:', err.message);
      var lbl = document.querySelector('.loading-label');
      if (lbl) lbl.textContent = 'Server busy — trying backup ' + (i + 1) + '...';
      if (i === OVERPASS_MIRRORS.length - 1) {
        throw new Error('All map servers failed. Please wait a moment and try Refresh Area.');
      }
      await new Promise(function(res){ setTimeout(res, 1000); });
    }
  }
}


function osmToVendor(el) {
  const t = el.tags || {};
  const rawName = t.name || t['name:en'] || t['brand'] || null;


  const nameLC    = (rawName || '').toLowerCase();
  const cuisineLC = (t.cuisine || '').toLowerCase();

  // Word-boundary regex — "bara" won't match "Barbara", "double" won't match "Double-A Mart".
  // This is the real gatekeeper since we fetch broadly from Overpass above.
  const doublesRx = /\bdoubles?\b|\bbara\b|\bchanna\b|\bpholourie\b/i;
  const isDoublesRelated =
    doublesRx.test(rawName || '') ||
    cuisineLC === 'trinidadian' || cuisineLC === 'doubles' ||
    cuisineLC.split(';').map(s => s.trim()).some(c => c === 'trinidadian' || c === 'doubles') ||
    t['diet:trinidadian'] === 'yes';

  // Drop anything that isn't a doubles vendor
  if (!isDoublesRelated) return null;

  const name     = rawName || 'Doubles Vendor';
  const street   = [t['addr:housenumber'], t['addr:street']].filter(Boolean).join(' ');
  const city     = t['addr:city'] || t['addr:suburb'] || '';
  const location = street ? (city ? `${street}, ${city}` : street) : (city || t['addr:postcode'] || 'Trinidad');


  const oh = t['opening_hours'] || '';
  const isOpenKnown = t['opening_hours:covid19'] !== 'closed';
  let openStatus = 'unknown'; 
  if (oh) openStatus = guessOpenNow(oh) ? 'open' : 'closed';
  if (userStatuses[el.id]) openStatus = userStatuses[el.id];


  const stars = t['stars'] ? parseFloat(t['stars']) : null;
  const rating = stars ? Math.min(5, stars) : null;


  const sells = ['Doubles'];
  if (nameLC.includes('bara'))                                          sells.push('Bara');
  if (nameLC.includes('channa'))                                        sells.push('Channa');
  if (nameLC.includes('pholourie') || cuisineLC.includes('pholourie'))  sells.push('Pholourie');


  const phone   = t.phone || t['contact:phone'] || null;
  const website = t.website || t['contact:website'] || null;
  const osmUrl  = `https://www.openstreetmap.org/node/${el.id}`;

  return {
    id:       String(el.id),
    osmId:    el.id,
    name,
    location,
    landmark: t.description || null,
    lat:      el.lat,
    lng:      el.lon,
    openStatus,
    openingHours: oh || null,
    isDoublesRelated,
    rating,
    numRatings: 0,
    sells,
    phone,
    website,
    osmUrl,
    cuisine:  t.cuisine || null,
    distance: null,
    comments: [],
  };
}

function capitalise(s) {
  return s.replace(/\b\w/g, c => c.toUpperCase());
}


function guessOpenNow(oh) {
  if (!oh) return false;
  if (oh === '24/7') return true;
  try {
    const now     = new Date();
    const dayIdx  = now.getDay(); // 0=Sun ... 6=Sat
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const DAY_MAP = { Mo:1, Tu:2, We:3, Th:4, Fr:5, Sa:6, Su:0 };

    // Expand "Mo-Fr" into [1,2,3,4,5]
    function expandDays(token) {
      token = token.trim();
      if (token.includes('-')) {
        const parts = token.split('-');
        const from = DAY_MAP[parts[0]], to = DAY_MAP[parts[1]];
        if (from === undefined || to === undefined) return [];
        const days = [];
        let cur = from;
        for (let guard = 0; guard < 8; guard++) {
          days.push(cur);
          if (cur === to) break;
          cur = (cur === 6) ? 0 : cur + 1;
        }
        return days;
      }
      return DAY_MAP[token] !== undefined ? [DAY_MAP[token]] : [];
    }

    // OSM hours can have multiple rules e.g. "Mo-Fr 06:00-14:00; Sa 06:00-12:00"
    const rules = oh.split(';').map(r => r.trim()).filter(Boolean);
    for (const rule of rules) {
      const timeMatches = [...rule.matchAll(/(\d{2}):(\d{2})-(\d{2}):(\d{2})/g)];
      if (!timeMatches.length) continue;

      const dayPart = rule.replace(/(\d{2}:\d{2}-\d{2}:\d{2})/g, '').trim();
      const ruleDays = dayPart
        ? dayPart.split(',').flatMap(t => expandDays(t.trim()))
        : [0,1,2,3,4,5,6];

      if (!ruleDays.includes(dayIdx)) continue;

      for (const m of timeMatches) {
        const open  = parseInt(m[1]) * 60 + parseInt(m[2]);
        const close = parseInt(m[3]) * 60 + parseInt(m[4]);
        const isOpen = close < open
          ? (nowMins >= open || nowMins <= close)  // overnight span
          : (nowMins >= open && nowMins <= close);
        if (isOpen) return true;
      }
    }
    return false;
  } catch(e) {
    return false;
  }
}


async function loadVendors(bbox) {
  setListLoading(true);
  try {

    var bounds = map.getBounds();
    var b = bbox || [
      bounds.getSouthWest().lat(), bounds.getSouthWest().lng(),
      bounds.getNorthEast().lat(), bounds.getNorthEast().lng()
    ];
    const data = await fetchFromOverpass(b);
    const parsed = data.elements.map(osmToVendor).filter(v => v !== null);


    parsed.forEach(v => {
      if (userComments[v.id])  v.comments    = userComments[v.id];
      if (userRatings[v.id])   v.userRating  = userRatings[v.id];
      if (userStatuses[v.id])  v.openStatus  = userStatuses[v.id];
      if (userRatings[v.id] && !v.rating) {
        v.rating = userRatings[v.id];
        v.numRatings = 1;
      }
    });

    vendors = parsed;
    placeMarkers();
    renderList();
  } catch (err) {
    console.error(err);
    document.getElementById('vendor-list').innerHTML =
      '<div class="no-results">⚠️ ' + err.message + '<br><br><button class="chip active" onclick="refreshData()" style="margin:0 auto;display:block;">↻ Try Again</button></div>';
    document.getElementById('sidebar-count').textContent = 'Failed to load';
  } finally {
    setListLoading(false);
  }
}

function setListLoading(on) {
  if (on) {
    document.getElementById('vendor-list').innerHTML =
      '<div class="loading-state"><div class="spinner"></div><span class="loading-label">Fetching doubles vendors from OpenStreetMap…</span></div>';
    document.getElementById('sidebar-count').textContent = 'Loading…';
  }
}

async function refreshData() {
  var bounds = map.getBounds();
  var bbox   = [
    bounds.getSouthWest().lat(), bounds.getSouthWest().lng(),
    bounds.getNorthEast().lat(), bounds.getNorthEast().lng()
  ];
  Object.values(markerLayers).forEach(function(m){ m.setMap(null); });
  markerLayers = {};
  Object.values(infoWindows).forEach(function(iw){ iw.close(); });
  infoWindows = {};
  document.getElementById('refresh-btn').textContent = '↻ Refreshing…';
  await loadVendors(bbox);
  document.getElementById('refresh-btn').textContent = '↻ Refresh Area';
  toast('↻ Map data refreshed!');
}

function markerSvgUrl(v) {
  const color = v.openStatus === 'open' ? '#27AE60' : v.openStatus === 'closed' ? '#C0392B' : '#7A8C82';
  const emoji = '🫓'; // All results are doubles vendors
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
    <path d="M18 0C8 0 0 8 0 18c0 13.5 18 26 18 26S36 31.5 36 18C36 8 28 0 18 0z" fill="${color}" opacity="0.92"/>
    <circle cx="18" cy="18" r="10" fill="rgba(255,255,255,0.15)"/>
    <text x="18" y="23" text-anchor="middle" font-size="11">${emoji}</text>
  </svg>`;
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

function popupHTML(v) {
  const statusClass = v.openStatus;
  const statusText  = v.openStatus === 'open' ? '● Open' : v.openStatus === 'closed' ? '● Closed' : '● Status Unknown';
  const ratingStr   = v.rating ? `★ ${v.rating.toFixed(1)}` : '';
  return `
    <div class="map-popup">
      <div class="map-popup-name">${v.name}</div>
      <div class="map-popup-loc">📍 ${v.location}</div>
      <div class="map-popup-meta">
        <span class="map-popup-status ${statusClass}">${statusText}</span>
        ${ratingStr ? `<span class="map-popup-rating">${ratingStr}</span>` : ''}
      </div>
      <button class="map-popup-btn" onclick="selectVendor('${v.id}')">View Details →</button>
    </div>`;
}

function placeMarkers() {
  vendors.forEach(v => {
    if (markerLayers[v.id]) return; 

    const marker = new google.maps.Marker({
      position: { lat: v.lat, lng: v.lng },
      map: map,
      title: v.name,
      icon: {
        url: markerSvgUrl(v),
        scaledSize: new google.maps.Size(36, 44),
        anchor: new google.maps.Point(18, 44),
      },
    });

    const infoWindow = new google.maps.InfoWindow({
      content: popupHTML(v),
      maxWidth: 230,
    });

    marker.addListener('click', () => {
      closeAllInfoWindows();
      infoWindow.open(map, marker);
      selectedId = v.id;
      renderList();
      openPanel(v);
    });

    markerLayers[v.id] = marker;
    infoWindows[v.id]  = infoWindow;
  });
}

function refreshMarkerIcon(v) {
  if (markerLayers[v.id]) {
    markerLayers[v.id].setIcon({
      url: markerSvgUrl(v),
      scaledSize: new google.maps.Size(36, 44),
      anchor: new google.maps.Point(18, 44),
    });
    if (infoWindows[v.id]) infoWindows[v.id].setContent(popupHTML(v));
  }
}


function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let list = vendors.filter(v =>
    !q || v.name.toLowerCase().includes(q) || v.location.toLowerCase().includes(q)
  );

  if (currentFilter === 'open') {
    // Only show vendors confirmed open right now
    list = list.filter(v => v.openStatus === 'open');

  } else if (currentFilter === 'rated') {
    // Rated vendors first, then fill in unrated alphabetically so tab is never empty
    const rated   = list.filter(v => v.rating).sort((a,b) => b.rating - a.rating);
    const unrated = list.filter(v => !v.rating).sort((a,b) => a.name.localeCompare(b.name));
    list = [...rated, ...unrated];

  } else if (currentFilter === 'nearby') {
    if (userLocation) {
      list = [...list].sort((a,b) => (a.distance || 9999) - (b.distance || 9999));
    } else {
      toast('Enable location first for Nearest filter');
    }
  }
  return list;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderList();
}

function filterList() { renderList(); }

function renderList() {
  const el    = document.getElementById('vendor-list');
  const list  = getFiltered();
  const count = document.getElementById('sidebar-count');

  if (currentFilter === 'open')   count.textContent = `${list.length} open right now`;
  else if (currentFilter === 'rated')  count.textContent = `${list.length} vendor${list.length !== 1 ? 's' : ''} — rated first`;
  else if (currentFilter === 'nearby') count.textContent = `${list.length} vendor${list.length !== 1 ? 's' : ''} — nearest first`;
  else                                 count.textContent = `${list.length} vendor${list.length !== 1 ? 's' : ''} found`;

  if (!list.length) {
    const msg = currentFilter === 'open'
      ? 'No vendors with confirmed open hours in this area'
      : 'No vendors match your search';
    el.innerHTML = `<div class="no-results">${msg}</div>`;
    return;
  }

  el.innerHTML = list.map(v => {
    const distStr   = v.distance !== null ? `${v.distance} km` : '';
    const ratingStr = v.rating ? `★ ${v.rating.toFixed(1)}` : '';
    const statusClass = v.openStatus;
    const hoursBadge  = v.openingHours
      ? `<span class="vc-source" style="color:var(--success);border-color:rgba(39,174,96,0.2);">🕐 Hours</span>`
      : '';
    return `
    <div class="vendor-card${selectedId === v.id ? ' selected' : ''}" onclick="selectVendor('${v.id}')">
      <div class="vc-top">
        <div class="vc-name">${v.name}</div>
        <div class="status-dot ${statusClass}"></div>
      </div>
      <div class="vc-loc">📍 ${v.location}</div>
      <div class="vc-meta">
        ${ratingStr  ? `<span class="vc-rating">${ratingStr}</span>` : ''}
        ${distStr    ? `<span class="vc-dist">${distStr}</span>`     : ''}
        ${hoursBadge}
        <span class="vc-source">OSM</span>
      </div>
      <div class="vc-tags">${v.sells.map(s => `<span class="tag">${s}</span>`).join('')}</div>
    </div>`;
  }).join('');
}


function selectVendor(id) {
  selectedId = id;
  renderList();
  const v = vendors.find(x => x.id === id);
  if (!v) return;
  const currentZoom = map.getZoom();
  map.panTo({ lat: v.lat, lng: v.lng });
  if (currentZoom < 15) map.setZoom(15);
  closeAllInfoWindows();
  if (infoWindows[id] && markerLayers[id]) infoWindows[id].open(map, markerLayers[id]);
  openPanel(v);
}


function starsHTML(n) {
  n = Math.round(parseFloat(n) * 2) / 2;
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= n ? '★' : (i - 0.5 === n ? '½' : '☆');
  return s;
}

function openPanel(v) {
  const isSaved   = savedIds.includes(v.id);
  const userStar  = userRatings[v.id] || 0;
  const status    = v.openStatus;
  const statusLabel = status === 'open' ? 'Open Now' : status === 'closed' ? 'Closed' : 'Status Unknown';

  const ratingBlock = v.rating
    ? `<div class="panel-rating">
        <span class="stars">${starsHTML(v.rating)}</span>
        <span class="rating-num">${v.rating.toFixed(1)}</span>
        <span class="rating-count">${v.numRatings > 0 ? `(${v.numRatings} ratings)` : '(OSM data)'}</span>
       </div>`
    : '';


  const extras = [];
  if (v.cuisine)    extras.push(['Cuisine', capitalise(v.cuisine.replace(/_/g,' ').replace(/;/g,', '))]);
  if (v.phone)      extras.push(['Phone', v.phone]);
  if (v.openingHours) extras.push(['Hours', v.openingHours]);
  if (v.landmark)   extras.push(['Note', v.landmark]);

  const extraHTML = extras.length ? `
    <div class="panel-section">
      <h4>Details</h4>
      <div class="info-grid">
        ${extras.map(([k,val]) => `
          <div class="info-row">
            <span class="info-key">${k}</span>
            <span class="info-val">${val}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  const comments = v.comments || [];

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-header">
      <div class="panel-badge ${status}">&bull; ${statusLabel}</div>
      <div class="panel-name">${v.name}</div>
      <div class="panel-loc">📍 ${v.location}</div>
      ${ratingBlock}
    </div>

    <div class="panel-body">

      <div class="panel-section">
        <h4>Community Status</h4>
        <div class="status-row">
          <div>
            <div class="status-text">${status === 'open' ? '✅ Open right now' : status === 'closed' ? '🔴 Currently closed' : '❓ Status unknown'}</div>
            <div class="status-time">Help the community — confirm below</div>
          </div>
          <div class="btn-group">
            <button class="btn-confirm open-btn"   onclick="confirmStatus('${v.id}',true)">✓ Open</button>
            <button class="btn-confirm closed-btn" onclick="confirmStatus('${v.id}',false)">✗ Closed</button>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h4>Rate This Vendor</h4>
        <div class="star-picker" id="star-picker">
          ${[1,2,3,4,5].map(n => `
            <span data-n="${n}" class="${userStar >= n ? 'lit' : ''}"
              onclick="rateVendor('${v.id}',${n})"
              onmouseover="hoverStars(${n})"
              onmouseout="resetStars(${userStar})">★</span>`).join('')}
        </div>
      </div>

      <div class="panel-section">
        <h4>Menu / Type</h4>
        <div class="menu-tags">${v.sells.map(s => `<span class="menu-tag">${s}</span>`).join('')}</div>
      </div>

      ${extraHTML}

      <div class="panel-section">
        <h4>View on Map</h4>
        <a class="osm-link" href="https://www.google.com/maps/search/?api=1&query=${v.lat},${v.lng}" target="_blank" rel="noopener" onclick="this.href='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(this.dataset.lat+','+this.dataset.lng)" data-lat="${v.lat}" data-lng="${v.lng}">
          🗺 Google Maps →
        </a>
        ${v.website ? `&nbsp; <a class="osm-link" href="${v.website}" target="_blank" rel="noopener">🌐 Website →</a>` : ''}
      </div>

      <div class="panel-section">
        <h4>Comments (${comments.length})</h4>
        <div class="comment-list" id="comment-list">
          ${comments.length ? comments.map(c => `
            <div class="comment">
              <div class="comment-meta">
                <span class="comment-user">${c.user}</span>
                <span class="comment-stars">${starsHTML(c.rating || 5)}</span>
                <span class="comment-time">${c.time}</span>
              </div>
              <div class="comment-text">${c.text}</div>
            </div>`).join('') : `<div style="font-size:.78rem;color:var(--text-muted);font-style:italic;">No comments yet — be the first!</div>`}
        </div>
        <div class="add-comment">
          <input id="comment-input" type="text" placeholder="Add a comment… (Enter to post)"
            onkeydown="if(event.key==='Enter') postComment('${v.id}')">
          <button onclick="postComment('${v.id}')">Post</button>
        </div>
      </div>

    </div>
  `;

  const actBar  = document.getElementById('panel-actions');
  const btnSave = document.getElementById('btn-save');
  actBar.style.display = 'flex';
  btnSave.textContent  = isSaved ? '♥ Saved' : '♡ Save';
  btnSave.classList.toggle('saved', isSaved);

  document.getElementById('info-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  selectedId = null;
  renderList();
}


function confirmStatus(id, isOpen) {
  const v = vendors.find(x => x.id === id);
  if (!v) return;
  v.openStatus = isOpen ? 'open' : 'closed';
  userStatuses[id] = v.openStatus;
  localStorage.setItem('df_statuses', JSON.stringify(userStatuses));
  refreshMarkerIcon(v);
  openPanel(v);
  renderList();
  toast(isOpen ? '✅ Marked as Open — thanks!' : '🔴 Marked as Closed — thanks!');
}

function hoverStars(n) {
  document.querySelectorAll('#star-picker span').forEach((s, i) => s.classList.toggle('lit', i < n));
}
function resetStars(current) {
  document.querySelectorAll('#star-picker span').forEach((s, i) => s.classList.toggle('lit', i < current));
}
function rateVendor(id, n) {
  const v = vendors.find(x => x.id === id);
  if (!v) return;
  const prev = v.rating || n;
  const cnt  = v.numRatings || 0;
  v.rating   = Math.min(5, Math.round((prev * cnt + n) / (cnt + 1) * 10) / 10);
  v.numRatings = cnt + 1;
  userRatings[id] = n;
  localStorage.setItem('df_ratings', JSON.stringify(userRatings));
  openPanel(v);
  renderList();
  toast(`Rated ${n}★ — thanks! You earned +15 pts`);
}

function postComment(id) {
  const input = document.getElementById('comment-input');
  const text  = input.value.trim();
  if (!text) return;
  const v = vendors.find(x => x.id === id);
  if (!v) return;
  const comment = { user: 'You', rating: userRatings[id] || 5, text, time: 'just now' };
  v.comments.unshift(comment);
  if (!userComments[id]) userComments[id] = [];
  userComments[id].unshift(comment);
  localStorage.setItem('df_comments', JSON.stringify(userComments));
  input.value = '';
  document.getElementById('comment-list').innerHTML = v.comments.map(c => `
    <div class="comment">
      <div class="comment-meta">
        <span class="comment-user">${c.user}</span>
        <span class="comment-stars">${starsHTML(c.rating || 5)}</span>
        <span class="comment-time">${c.time}</span>
      </div>
      <div class="comment-text">${c.text}</div>
    </div>`).join('');
  toast('Comment posted! +5 pts');
}

function toggleSave() {
  if (!selectedId) return;
  const idx = savedIds.indexOf(selectedId);
  if (idx === -1) { savedIds.push(selectedId); toast('Vendor saved! ♥'); }
  else            { savedIds.splice(idx, 1);    toast('Removed from saved'); }
  localStorage.setItem('df_saved', JSON.stringify(savedIds));
  const btn    = document.getElementById('btn-save');
  const isSaved = savedIds.includes(selectedId);
  btn.textContent = isSaved ? '♥ Saved' : '♡ Save';
  btn.classList.toggle('saved', isSaved);
}

function openDirections() {
  if (!selectedId) return;
  const v = vendors.find(x => x.id === selectedId);
  if (!v) return;

  window.open(`https://www.google.com/maps/dir/?api=1&destination=${v.lat},${v.lng}`, '_blank');
}


function locateMe() {
  if (!navigator.geolocation) { toast('Geolocation not supported'); return; }
  const btn = document.getElementById('locate-btn');
  btn.textContent = '…Locating';
  navigator.geolocation.getCurrentPosition(pos => {
    btn.textContent = '📍 My Location';
    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };

    if (userMarker) userMarker.setMap(null);
    userMarker = new google.maps.Marker({
      position: userLocation,
      map: map,
      title: 'You are here',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: '#4285F4',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
      },
    });
    new google.maps.InfoWindow({ content: '<b style="color:#0E1A14">📍 You are here</b>' })
      .open(map, userMarker);

    map.panTo(userLocation);
    map.setZoom(14);
    toast('📍 Located you!');


    vendors.forEach(v => {
      const R = 6371;
      const dLat = (v.lat - userLocation.lat) * Math.PI / 180;
      const dLon = (v.lng - userLocation.lng) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(userLocation.lat*Math.PI/180) * Math.cos(v.lat*Math.PI/180) * Math.sin(dLon/2)**2;
      v.distance = +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
    });
    renderList();


    const b = 0.15; 
    const bbox = [userLocation.lat - b, userLocation.lng - b, userLocation.lat + b, userLocation.lng + b];
    Object.values(markerLayers).forEach(m => m.setMap(null));
    markerLayers = {};
    Object.values(infoWindows).forEach(iw => iw.close());
    infoWindows = {};
    loadVendors(bbox);
  }, err => {
    btn.textContent = '📍 My Location';
    toast('Could not get location: ' + err.message);
  });
}


function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2800);
}


window.addEventListener('load', initMap);


if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.error('SW registration failed:', err));
}
</script>
